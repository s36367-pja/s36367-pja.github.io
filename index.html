<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Navigation</title>

<style>
    body {
        background-color: #000;
        color: #fff;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 40px;
    }

    table {
        width: 100%;
        text-align: center;
        border-collapse: collapse;
    }

    td {
        padding: 20px;
    }

    img {
        width: 250px;
        height: 180px;
        object-fit: cover;
        border: 2px solid #444;
        border-radius: 8px;
        transition: transform 0.3s ease, border-color 0.3s ease;
    }

    img:hover {
        transform: scale(1.05);
        border-color: #fff;
    }

    .caption {
        margin-top: 12px;
        font-size: 18px;
        color: #fff;
    }

    a {
        text-decoration: none;
    }
</style>
</head>

<body>

<table>
    <tr>
        <td>
            <a href="subpage1.html">
                <img src="image1.jpg" alt="Image 1">
            </a>
            <div class="caption">Page One</div>
        </td>

        <td>
            <a href="subpage2.html">
                <img src="image2.jpg" alt="Image 2">
            </a>
            <div class="caption">Page Two</div>
        </td>

        <td>
            <a href="subpage3.html">
                <img src="image3.jpg" alt="Image 3">
            </a>
            <div class="caption">Page Three</div>
        </td>

        <td>
            <a href="subpage4.html">
                <img src="image4.jpg" alt="Image 4">
            </a>
            <div class="caption">Page Four</div>
        </td>
    </tr>
</table>

</body>
</html>
